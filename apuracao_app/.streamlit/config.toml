[theme]
base = "light"
primaryColor = "#2563EB"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#EFF6FF"
textColor = "#1E293B"
font = "sans serif"

[server]
# Aceita conexões apenas do próprio computador — nunca expor na rede/VPN,
# pois o modo "Apontar pasta" permite ler arquivos da máquina.
address = "localhost"
port = 8510
# headless=false: o Streamlit abre o navegador sozinho quando o servidor fica
# pronto. Mantemos false de propósito — em headless=true o Streamlit faz uma
# chamada HTTP externa (checkip.amazonaws.com) a cada início só para descobrir o
# IP externo, o que numa VPN corporativa trava alguns segundos e bate num
# endpoint externo desnecessário.
headless = false
# Não mostrar o prompt de e-mail na primeira execução (senão o app trava no
# terminal esperando o usuário digitar). Substitui a necessidade do headless.
showEmailPrompt = false

[browser]
# Não enviar estatísticas de uso para servidores externos (ambiente corporativo).
gatherUsageStats = false

[client]
# Não exibir stack traces no navegador (vazam caminhos e código interno).
showErrorDetails = "none"
